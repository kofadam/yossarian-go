---
apiVersion: projectcontour.io/v1
kind: HTTPProxy
metadata:
  name: yossarian-go-httpproxy
  namespace: yossarian-go
  labels:
    app: yossarian-go
spec:
  virtualhost:
    fqdn: yossarian-go.example.com  # CHANGE THIS to your domain
    tls:
      secretName: yossarian-go-tls  # Must match certificate secretName
  routes:
    # All traffic through frontend (session auth requires shared session store)
    # Frontend handles MinIO downloads directly
    - conditions:
        - prefix: /
      services:
        - name: yossarian-frontend
          port: 8080
      loadBalancerPolicy:
        strategy: Cookie
      cookieRewritePolicies:
        - name: X-Contour-Session-Affinity
          pathRewrite:
            value: /
          sameSite: Lax
          secure: true
      timeoutPolicy:
        idle: 300s
        response: 300s
